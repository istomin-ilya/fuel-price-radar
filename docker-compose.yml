services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuel}
      POSTGRES_DB: ${POSTGRES_DB:-fuel}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fuel}"]
      interval: 5s
      timeout: 3s
      retries: 10

  cron:
    build: .
    profiles: ["server"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-fuel}:${POSTGRES_PASSWORD:-fuel}@postgres:5432/${POSTGRES_DB:-fuel}
    volumes:
      - ./data:/app/data
      - ./site:/app/site

volumes:
  pgdata:
