services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuel}
      POSTGRES_DB: ${POSTGRES_DB:-fuel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fuel}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
