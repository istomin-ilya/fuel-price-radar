name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fuel
          POSTGRES_PASSWORD: fuel
          POSTGRES_DB: fuel
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fuel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://fuel:fuel@localhost:5432/fuel
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run alembic upgrade head
      - run: uv run pytest -v
